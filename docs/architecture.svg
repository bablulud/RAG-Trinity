<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e08a00"/>
    </marker>
    <marker id="arrPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7b3fe4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="590" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">RAG-Trinity  how each RAG concept maps to the code</text>
  <text x="590" y="56" text-anchor="middle" font-size="13" fill="#6b7280">Green = offline indexing · Purple = shared vector store · Orange = online query</text>

  <!-- INDEXING lane -->
  <rect x="40" y="76" width="1100" height="150" rx="12" fill="#e8f6e8" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="58" y="99" font-size="13" font-weight="700" fill="#2e7d32">INDEXING · offline, run once  scripts/run_indexer.py</text>

  <!-- Indexing boxes -->
  <g>
    <rect x="70" y="120" width="180" height="80" rx="8" fill="#d6f5d6" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="160" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1b3d1b">Documents</text>
    <text x="160" y="172" text-anchor="middle" font-size="11" font-style="italic" fill="#3d6b3d">pdfs/*.pdf</text>

    <rect x="320" y="120" width="180" height="80" rx="8" fill="#d6f5d6" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="410" y="147" text-anchor="middle" font-size="14" font-weight="700" fill="#1b3d1b">Load / Parse</text>
    <text x="410" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#3d6b3d">parse_pdf · pdfplumber</text>
    <text x="410" y="184" text-anchor="middle" font-size="11" fill="#3d6b3d">processor.py</text>

    <rect x="570" y="120" width="180" height="80" rx="8" fill="#d6f5d6" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="660" y="147" text-anchor="middle" font-size="14" font-weight="700" fill="#1b3d1b">Chunk</text>
    <text x="660" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#3d6b3d">chunk_text · 1000 / 200</text>
    <text x="660" y="184" text-anchor="middle" font-size="11" fill="#3d6b3d">processor.py</text>

    <rect x="820" y="120" width="180" height="80" rx="8" fill="#d6f5d6" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="910" y="147" text-anchor="middle" font-size="14" font-weight="700" fill="#1b3d1b">Embed</text>
    <text x="910" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#3d6b3d">all-MiniLM-L6-v2</text>
    <text x="910" y="184" text-anchor="middle" font-size="11" fill="#3d6b3d">chroma_db.py</text>
  </g>

  <!-- Indexing arrows -->
  <line x1="250" y1="160" x2="315" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="500" y1="160" x2="565" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="750" y1="160" x2="815" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ChromaDB -->
  <rect x="490" y="250" width="200" height="86" rx="16" fill="#e7d6ff" stroke="#7b3fe4" stroke-width="2"/>
  <text x="590" y="279" text-anchor="middle" font-size="12" fill="#4b2a7a">Vector Store</text>
  <text x="590" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#2e1a4a">ChromaDB</text>
  <text x="590" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#4b2a7a">collection: documents</text>

  <!-- Embed -> ChromaDB (upsert) -->
  <path d="M905,200 C860,235 720,245 692,268" fill="none" stroke="#7b3fe4" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="812" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#7b3fe4">upsert vectors</text>

  <!-- ChromaDB -> Retrieve (top-K chunks) -->
  <path d="M520,336 C500,360 500,380 498,402" fill="none" stroke="#7b3fe4" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="430" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#7b3fe4">top-K chunks</text>

  <!-- Embed query -> ChromaDB (dashed) -->
  <path d="M315,408 C360,372 470,350 500,332" fill="none" stroke="#7b3fe4" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrPurple)"/>
  <text x="330" y="378" text-anchor="middle" font-size="10" font-style="italic" fill="#8a63d2">same embedding space</text>

  <!-- QUERY lane -->
  <rect x="40" y="410" width="1100" height="120" rx="12" fill="#fff2e0" stroke="#e08a00" stroke-width="1.5"/>
  <text x="58" y="433" font-size="13" font-weight="700" fill="#b36b00">QUERY · online, per question  main.py</text>

  <!-- Query boxes -->
  <g>
    <rect x="60" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="135" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Question</text>
    <text x="135" y="495" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">interactive / one-shot</text>

    <rect x="240" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="315" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Embed query</text>
    <text x="315" y="495" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">all-MiniLM-L6-v2</text>

    <rect x="420" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="495" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Retrieve top-K</text>
    <text x="495" y="490" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">collection.query</text>
    <text x="495" y="505" text-anchor="middle" font-size="10" fill="#7a5410">main.py</text>

    <rect x="600" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="675" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Augment</text>
    <text x="675" y="490" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">build_context ’ prompt</text>
    <text x="675" y="505" text-anchor="middle" font-size="10" fill="#7a5410">main.py</text>

    <rect x="780" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="855" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Generate</text>
    <text x="855" y="490" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">OpenAI gpt-4o-mini</text>
    <text x="855" y="505" text-anchor="middle" font-size="10" fill="#7a5410">main.py</text>

    <rect x="960" y="448" width="150" height="66" rx="8" fill="#ffe6c7" stroke="#e08a00" stroke-width="1.5"/>
    <text x="1035" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3d00">Answer</text>
    <text x="1035" y="495" text-anchor="middle" font-size="10" font-style="italic" fill="#7a5410">+ cited sources</text>
  </g>

  <!-- Query arrows -->
  <line x1="210" y1="481" x2="235" y2="481" stroke="#e08a00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="390" y1="481" x2="415" y2="481" stroke="#e08a00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="570" y1="481" x2="595" y2="481" stroke="#e08a00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="750" y1="481" x2="775" y2="481" stroke="#e08a00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="930" y1="481" x2="955" y2="481" stroke="#e08a00" stroke-width="2" marker-end="url(#arrOrange)"/>

  <!-- Footer -->
  <text x="590" y="550" text-anchor="middle" font-size="11" fill="#6b7280">Each box names the RAG concept and the code that implements it. Indexing builds the store once; every question retrieves across ALL indexed PDFs.</text>
</svg>
